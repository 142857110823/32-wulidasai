<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="freshsalt_surface">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>freshsalt_surface</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      var isLocalPreview =
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1';
      if (!isLocalPreview || !('serviceWorker' in navigator)) {
        return;
      }

      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        return Promise.all(
          registrations.map(function (registration) {
            return registration.unregister();
          })
        );
      });

      if ('caches' in window) {
        caches.keys().then(function (keys) {
          return Promise.all(
            keys.map(function (key) {
              return caches.delete(key);
            })
          );
        });
      }

      var activatedWorker = {
        scriptURL: 'freshsalt-local-preview-disabled-sw',
        state: 'activated',
        addEventListener: function () {},
      };

      Object.defineProperty(navigator.serviceWorker, 'register', {
        configurable: true,
        value: async function () {
          return {
            active: activatedWorker,
            installing: null,
            waiting: null,
            update: async function () {
              return {
                active: activatedWorker,
                installing: null,
                waiting: null,
              };
            },
          };
        },
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
